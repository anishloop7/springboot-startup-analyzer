spring.application.name=startup-analyzer-demo

server.port=8080

# ── H2 In-Memory Database ────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:demodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA ──────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Cache ─────────────────────────────────────────────────────
spring.cache.type=simple

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── Startup Analyzer Config (all optional — defaults shown) ──
startup.analyzer.enabled=true
startup.analyzer.slow-bean-threshold-ms=50
startup.analyzer.html-report-enabled=true
startup.analyzer.html-report-path=startup-report.html
startup.analyzer.console-report-enabled=true
startup.analyzer.blocking-call-detection-enabled=true
startup.analyzer.lazy-load-suggestions-enabled=true
startup.analyzer.auto-config-analysis-enabled=true

# ── Token config ─────────────────────────────────────────────
app.token.expiry-seconds=3600

# ── Inventory ────────────────────────────────────────────────
inventory.check-interval-ms=3600000

# ── Logging ──────────────────────────────────────────────────
logging.level.io.github.anishraj=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
